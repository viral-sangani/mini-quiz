apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: redis
    repoURL: registry-1.docker.io/bitnamicharts
    targetRevision: 20.6.2
    helm:
      releaseName: redis
      values: |
        # Bitnami pulled their main Docker Hub repo in 2024 — use the
        # bitnamilegacy mirror that's still public + free. Chart structure
        # is compatible.
        global:
          security:
            allowInsecureImages: true
        image:
          registry: docker.io
          repository: bitnamilegacy/redis
          tag: 8.2.1-debian-12-r0
        architecture: standalone
        auth:
          enabled: true
          existingSecret: redis-auth
          existingSecretPasswordKey: password
        master:
          persistence:
            enabled: true
            size: 5Gi
            storageClass: do-block-storage
          configuration: |-
            appendonly yes
            maxmemory-policy noeviction
            save ""
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 512Mi }
        replica:
          replicaCount: 0
        metrics:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
