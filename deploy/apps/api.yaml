apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/celo-org/mini-quiz
    targetRevision: main
    path: deploy/charts/api
    helm:
      releaseName: api
  destination:
    server: https://kubernetes.default.svc
    namespace: api
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
  # The capacity prewarmer CronJob patches HPA minReplicas/maxReplicas at
  # runtime to warm capacity ahead of scheduled games. Without this,
  # selfHeal reverts those patches within a reconcile loop. Ignore the
  # autoscaler-owned fields so Argo leaves prewarmer patches in place.
  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/minReplicas
        - /spec/maxReplicas
