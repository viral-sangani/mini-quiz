apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      valueFiles: []
      values: |
        controller:
          # Deployment (not DaemonSet) so the cluster-autoscaler can drain a
          # prewarm node after capacity-prewarmer resets the floor to 1. A
          # DaemonSet pins one controller pod to every node, which blocks the
          # surplus node from ever being reclaimed. Behind the DO LoadBalancer
          # a single replica is sufficient. See docs/decisions.md.
          kind: Deployment
          replicaCount: 1
          hostNetwork: false
          dnsPolicy: ClusterFirst
          podAnnotations:
            cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
          service:
            enabled: true
            type: LoadBalancer
            annotations:
              service.beta.kubernetes.io/do-loadbalancer-name: miniquiz-prod-ingress
          publishService:
            enabled: true
          config:
            use-forwarded-headers: "true"
            compute-full-forwarded-for: "true"
            real-ip-header: "CF-Connecting-IP"
            # Loosened for PoC. Tighten by mirroring Cloudflare's published IP list.
            proxy-real-ip-cidr: "0.0.0.0/0,::/0"
            use-proxy-protocol: "false"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { memory: 256Mi }
          admissionWebhooks:
            enabled: true
        defaultBackend:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
