apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: miniquiz-pg
  namespace: data
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised

  storage:
    size: 30Gi
    storageClass: do-block-storage

  bootstrap:
    initdb:
      database: miniquiz
      owner: miniquiz
      # password is generated by CNPG on first bootstrap and stored in
      # Secret/miniquiz-pg-app — referenced by name from the api chart.

  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { memory: 2Gi }

  enableSuperuserAccess: false

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      work_mem: "8MB"
      effective_cache_size: "1GB"

  # No backup block — PoC. Add `backup.barmanObjectStore` here later
  # to ship WAL to Cloudflare R2.
