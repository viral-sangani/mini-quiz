{{- if .Values.scoreWorker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}-score-worker
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}-score-worker
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.scoreWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}-score-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}-score-worker
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: score-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/score-worker.js"]
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: APP_ROLE
              value: "score-worker"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRefs.postgresSecret }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRefs.postgresSecret }}
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRefs.redisSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Values.postgres.service }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}?{{ .Values.postgres.pooledParams }}"
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@{{ .Values.redis.service }}:{{ .Values.redis.port }}"
            - name: NATS_URL
              value: "nats://{{ .Values.nats.service }}:{{ .Values.nats.port }}"
          envFrom:
            - secretRef:
                name: {{ .Values.secretRefs.appSecret }}
          {{- if .Values.scoreWorker.livenessProbe.enabled }}
          # No HTTP server in this worker; confirm the node process is alive.
          # TODO: switch to a heartbeat-file freshness check once the worker
          # touches a file each loop iteration.
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "dist/score-worker.js"]
            initialDelaySeconds: {{ .Values.scoreWorker.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.scoreWorker.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.scoreWorker.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.scoreWorker.livenessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.scoreWorker.resources | nindent 12 }}
{{- end }}
