{{- if .Values.realtime.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "api.fullname" . }}-realtime
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}-realtime
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.realtime.service.type }}
  ports:
    - port: {{ .Values.realtime.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}-realtime
{{- end }}
