{{- if and .Values.worker.enabled .Values.worker.pdb.enabled }}
# PDB for the singleton scheduler/finalizer worker. maxUnavailable: 0 means a
# voluntary disruption (node drain) must wait for a healthy replacement before
# the existing pod is evicted. minAvailable: 1 would instead permanently block
# voluntary eviction on a 1-replica Deployment (drain hangs), so we use
# maxUnavailable: 0, which lets the rollout/drain proceed once the new pod is up.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "api.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}-worker
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  maxUnavailable: {{ .Values.worker.pdb.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}-worker
{{- end }}
