image:
  repository: docker.io/viralsangani/miniquiz-api
  tag: "9ea8045cf85c"
  pullPolicy: IfNotPresent

# Set to a Secret with .dockerconfigjson if the image is private.
imagePullSecret: ""

replicaCount: 1

# Cluster-scoped PriorityClasses for the singleton control-plane workers
# (scheduler + payout). Higher priority keeps them from being preempted by
# burstable web/realtime/score pods during node pressure. Disabled by default
# is not an option here — these are control-plane critical — but the values
# are exposed so the numbers stay reviewable.
priorityClasses:
  enabled: true
  # Above default (0), below DO/system-cluster-critical. Singletons that must
  # not be evicted to schedule a scaled-up stateless pod.
  criticalWorkerValue: 100000

worker:
  enabled: true
  replicaCount: 1
  # Liveness only. Workers run no HTTP server, so we cannot use httpGet.
  # An exec probe confirms the node process is alive (catches a hung/zombied
  # container that the kubelet would otherwise leave running). A true
  # work-progress heartbeat would require a one-line app change to touch a
  # heartbeat file each loop; see notes / TODO below.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  # Singleton scheduler/finalizer. maxUnavailable: 0 blocks voluntary eviction
  # (node drain) until a replacement is healthy, protecting the single replica.
  pdb:
    enabled: true
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

realtime:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 4000
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      memory: 768Mi

scoreWorker:
  enabled: true
  replicaCount: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      memory: 768Mi

payoutWorker:
  enabled: true
  replicaCount: 1
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  # Singleton payout worker. Same rationale as the scheduler worker.
  pdb:
    enabled: true
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: true
  className: nginx
  host: api.miniquiz.club
  tlsSecretName: api-miniquiz-tls
  clusterIssuer: letsencrypt-prod
  # Cloudflare proxy passes huge HTTP/2 frames; let nginx accept SSE-friendly
  # long-lived connections.
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    memory: 768Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

capacityPrewarmer:
  enabled: true
  schedule: "* * * * *"
  dryRun: false
  namespace: api
  warmLeadMs: 600000
  cooldownMs: 600000
  nodePoolEnabled: true
  digitalOceanClusterName: miniquiz-prod
  digitalOceanNodePoolName: main
  digitalOceanNodePoolMaxNodes: 4
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

embeddedSse: false

# Static env injected into both the api Deployment and the migration Job.
env:
  NODE_ENV: production
  PORT: "4000"
  LOG_LEVEL: info
  PAYOUT_BURST_CONCURRENCY: "100"
  PAYOUT_BURST_WINDOW_SIZE: "100"
  PAYOUT_BURST_WINDOW_WAIT_FOR_MINED: "true"
  PAYOUT_BURST_WINDOW_NONCE_POLL_MS: "100"
  PAYOUT_BURST_WINDOW_NONCE_TIMEOUT_MS: "60000"
  PAYOUT_BURST_RECEIPT_TIMEOUT_MS: "180000"

# Secrets — references to existing Secrets in the cluster.
# - api-secrets: produced by `kubeseal` from deploy/manifests/sealed-secrets/api-secrets.yaml
# - miniquiz-pg-app: auto-created by CNPG with username/password/uri
# - redis-auth: produced by `kubeseal`, holds .password
secretRefs:
  appSecret: api-secrets
  postgresSecret: miniquiz-pg-app
  redisSecret: redis-auth

postgres:
  service: miniquiz-pg-pooler-rw.data.svc.cluster.local
  directService: miniquiz-pg-rw.data.svc.cluster.local
  port: 5432
  database: miniquiz
  pooledParams: "pgbouncer=true&connection_limit=3&pool_timeout=10"

redis:
  service: redis-master.data.svc.cluster.local
  port: 6379

nats:
  service: nats.data.svc.cluster.local
  port: 4222
