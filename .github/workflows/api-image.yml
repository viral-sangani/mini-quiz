name: api-image

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - ".github/workflows/api-image.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: miniquiz-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        env:
          SHA: ${{ github.sha }}
        run: |
          short=$(printf '%s' "$SHA" | cut -c1-12)
          printf 'tag=%s\n' "$short" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  bump-chart:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump api chart image tag
        env:
          NEW_TAG: ${{ needs.build-push.outputs.tag }}
        run: |
          set -euo pipefail
          file=deploy/charts/api/values.yaml
          if [ ! -f "$file" ]; then
            echo "values file missing — skipping bump"
            exit 0
          fi
          sed -i -E 's|^( *tag: *).*|\1"'"$NEW_TAG"'"|' "$file"
          if git diff --quiet -- "$file"; then
            echo "no change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "chore(deploy): bump api image to ${NEW_TAG}"
          git push
